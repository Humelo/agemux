name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: go test ./...
      - run: python3 tests/smoke.py
      - run: python3 tests/public_safety.py
